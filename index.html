<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pro News Thumbnail Maker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f4f4f4; }
        .container { max-width: 1200px; margin: auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .controls { margin-bottom: 20px; background: #f0f0f0; padding: 15px; border-radius: 8px; display: flex; gap: 10px; flex-wrap: wrap; }
        select, input, textarea { padding: 10px; font-size: 16px; }
        #preview { width: 1080px; height: 1350px; background: #fff; display: flex; flex-direction: column; position: relative; transform: scale(0.5); transform-origin: top left; margin-bottom: -675px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📸 Pro News Thumbnail Maker</h1>
    <input type="file" id="imageInput" multiple accept="image/*" style="margin-bottom: 20px;" /><br>

    <div class="controls" id="controlPanel" style="display:none;">
        <select id="layoutSelect">
            <option value="layout1">Layout 1</option>
            <option value="layout3">Layout 3 (Custom Match)</option>
            <option value="layout2">Layout 2</option>
        </select>
        
        <select id="themeColor">
            <option value="#800000">Box: Maroon</option>
            <option value="#000000">Box: Black</option>
            <option value="#0000FF">Box: Blue</option>
            <option value="#FF0000">Box: Red</option>
            <option value="#FFFFFF">Box: White</option>
            <option value="#008000">Box: Green</option>
            <option value="#FFFF00">Box: Yellow</option>
        </select>

        <select id="headColor">
            <option value="#FFFFFF">Head: White</option>
            <option value="#FFFF00">Head: Yellow</option>
            <option value="#000000">Head: Black</option>
            <option value="#FF0000">Head: Red</option>
            <option value="#0000FF">Head: Blue</option>
            <option value="#800000">Head: Maroon</option>
            <option value="#008000">Head: Green</option>
        </select>

        <select id="subColor">
            <option value="#FFFF00">Sub: Yellow</option>
            <option value="#FFFFFF">Sub: White</option>
            <option value="#FF0000">Sub: Red</option>
            <option value="#000000">Sub: Black</option>
            <option value="#0000FF">Sub: Blue</option>
            <option value="#800000">Sub: Maroon</option>
            <option value="#008000">Sub: Green</option>
        </select>
    </div>

    <input type="text" id="headlineInput" placeholder="Headline" style="width: 100%; margin-bottom: 10px; display:none;" />
    <textarea id="subHeadlineInput" placeholder="Sub Headline" style="width: 100%; height: 60px; margin-bottom: 10px; display:none;"></textarea>

    <div id="previewContainer" style="overflow: auto; width: 560px; height: 700px; border: 2px dashed #ccc; display:none;">
        <div id="preview">
            <div id="renderArea" style="width: 100%; height: 100%; display: flex; flex-direction: column; background: #fff; position: relative;"></div>
        </div>
    </div>

    <button id="downloadBtn" style="margin-top: 20px; padding: 15px 30px; font-size: 20px; cursor: pointer; display:none;">Download Thumbnail</button>
</div>

<script>
    let photos = [];

    document.getElementById('imageInput').addEventListener('change', function(e) {
        photos = Array.from(e.target.files).map(file => URL.createObjectURL(file));
        if(photos.length >= 3) {
            document.getElementById('controlPanel').style.display = 'flex';
            document.getElementById('headlineInput').style.display = 'block';
            document.getElementById('subHeadlineInput').style.display = 'block';
            document.getElementById('previewContainer').style.display = 'block';
            document.getElementById('downloadBtn').style.display = 'block';
            updatePreview();
        } else {
            alert('ଦୟାକରି କମ୍ରେ ୩ଟି ଫଟୋ ସିଲେକ୍ଟ କରନ୍ତୁ!');
        }
    });

    function updatePreview() {
        const layout = document.getElementById('layoutSelect').value;
        const themeColor = document.getElementById('themeColor').value;
        const headColor = document.getElementById('headColor').value;
        const subColor = document.getElementById('subColor').value;
        const headline = document.getElementById('headlineInput').value;
        const subHeadline = document.getElementById('subHeadlineInput').value;
        const renderArea = document.getElementById('renderArea');

        if(layout === 'layout1') {
            renderArea.innerHTML = `
                <div style="width: 100%; height: 60%; display: flex; background: #000;">
                    <img src="${photos[0]}" style="width: 50%; height: 100%; object-fit: cover; border-right: 2px solid #fff;"/>
                    <img src="${photos[1]}" style="width: 50%; height: 100%; object-fit: cover; border-left: 2px solid #fff;"/>
                </div>
                <div style="background: ${themeColor}; height: 40%; padding: 30px 40px; display: flex; align-items: center; box-sizing: border-box;">
                    <img src="${photos[2]}" style="width: 300px; height: 300px; border-radius: 50%; border: 3px solid #FFFF00; box-shadow: 0px 10px 25px rgba(0,0,0,0.6); flex-shrink: 0; object-fit: cover;" />
                    <div style="margin-left: 40px; flex: 1; overflow: hidden;">
                        <h1 style="font-size: 85px; font-weight: 900; color: ${headColor}; margin: 0 0 15px 0; line-height: 1.05;">${headline}</h1>
                        <p style="font-size: 45px; font-weight: 800; color: ${subColor}; margin: 0; line-height: 1.2;">${subHeadline}</p>
                    </div>
                </div>
            `;
        } else if(layout === 'layout3') {
            renderArea.innerHTML = `
                <div style="padding: 40px 30px; text-align: center; background: ${themeColor}; min-height: 160px; display: flex; align-items: center; justify-content: center; box-sizing: border-box;">
                    <h1 style="font-size: 85px; font-weight: 900; margin: 0; color: ${headColor}; line-height: 1.1;">${headline}</h1>
                </div>
                <div style="flex: 1; position: relative; padding: 30px 40px; display: flex; align-items: center; justify-content: center;">
                    <img src="${photos[0]}" style="width: 100%; height: 730px; object-fit: cover; border-radius: 30px;" />
                    <img src="${photos[1]}" style="width: 320px; height: 320px; border-radius: 50%; position: absolute; bottom: 70px; left: 70px; border: 3px solid #FFFF00; box-shadow: 0px 15px 35px rgba(0,0,0,0.7); object-fit: cover;" />
                    <img src="${photos[2]}" style="width: 320px; height: 320px; border-radius: 50%; position: absolute; bottom: 70px; right: 70px; border: 3px solid #FFFF00; box-shadow: 0px 15px 35px rgba(0,0,0,0.7); object-fit: cover;" />
                </div>
                <div style="padding: 40px 30px; text-align: center; background: ${themeColor}; min-height: 160px; display: flex; align-items: center; justify-content: center; box-sizing: border-box;">
                    <p style="font-size: 45px; font-weight: bold; color: ${subColor}; margin: 0; line-height: 1.3;">${subHeadline}</p>
                </div>
            `;
        } else if(layout === 'layout2') {
            renderArea.innerHTML = `
                <img src="${photos[0]}" style="height: 42%; width: 100%; object-fit: cover;" />
                <div style="background: ${themeColor}; height: 16%; display: flex; align-items: center; justify-content: center; padding: 15px; box-sizing: border-box;">
                    <h2 style="font-size: 75px; margin: 0; font-weight: 900; color: ${headColor}; text-align: center; line-height: 1.1;">${headline}</h2>
                </div>
                <img src="${photos[1]}" style="height: 42%; width: 100%; object-fit: cover;" />
            `;
        }
    }

    document.getElementById('layoutSelect').addEventListener('change', updatePreview);
    document.getElementById('themeColor').addEventListener('change', updatePreview);
    document.getElementById('headColor').addEventListener('change', updatePreview);
    document.getElementById('subColor').addEventListener('change', updatePreview);
    document.getElementById('headlineInput').addEventListener('input', updatePreview);
    document.getElementById('subHeadlineInput').addEventListener('input', updatePreview);

    document.getElementById('downloadBtn').addEventListener('click', async () => {
        const previewElement = document.getElementById('preview');
        previewElement.style.transform = 'scale(1)';
        previewElement.style.marginBottom = '0';

        const canvas = await html2canvas(previewElement, { scale: 2, width: 1080, height: 1350, useCORS: true });
        const link = document.createElement('a');
        link.href = canvas.toDataURL('image/png');
        link.download = 'thumbnail.png';
        link.click();

        previewElement.style.transform = 'scale(0.5)';
        previewElement.style.marginBottom = '-675px';
    });
</script>

</body>
</html>
